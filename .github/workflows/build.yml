name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get build info
        id: build_info
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          IS_TAG=${{ startsWith(github.ref, 'refs/tags/v') }}
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "COMMIT_SHORT=$COMMIT_SHORT" >> $GITHUB_OUTPUT
          echo "IS_TAG=$IS_TAG" >> $GITHUB_OUTPUT

      - name: Set build version
        run: |
          sed -i "s/^version:.*/version: 0.0.1+${{ steps.build_info.outputs.BUILD_NUMBER }}/" pubspec.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Clean build artifacts
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        run: flutter build apk --release --split-per-abi --dart-define=COMMIT_SHA=${{ steps.build_info.outputs.COMMIT_SHORT }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocket-provisioner-build${{ steps.build_info.outputs.BUILD_NUMBER }}-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Delete existing dev release
        if: ${{ steps.build_info.outputs.IS_TAG != 'true' }}
        run: gh release delete dev --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        if: ${{ steps.build_info.outputs.IS_TAG != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Build ${{ steps.build_info.outputs.BUILD_NUMBER }} (${{ steps.build_info.outputs.COMMIT_SHORT }})"
          prerelease: true
          files: build/app/outputs/flutter-apk/app-*-release.apk
          body: |
            Latest development build from `main` branch.

            **Build:** ${{ steps.build_info.outputs.BUILD_NUMBER }}
            **Commit:** ${{ github.sha }}

            Download the APK for your device architecture:
            - `app-arm64-v8a-release.apk` — Most modern devices
            - `app-armeabi-v7a-release.apk` — Older 32-bit devices
            - `app-x86_64-release.apk` — Emulators / x86 devices
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tagged release
        if: ${{ steps.build_info.outputs.IS_TAG == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Pocket-Provisioner ${{ github.ref_name }} (Build ${{ steps.build_info.outputs.BUILD_NUMBER }})"
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-*-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
